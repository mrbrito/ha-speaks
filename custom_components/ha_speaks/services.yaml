announce:
  name: Announce
  description: Broadcast a spoken announcement to a HA Speaks group or explicit media players.
  fields:
    message:
      name: Message
      description: Text to announce.
      required: true
      selector:
        text:
    group:
      name: Group
      description: HA Speaks speech group name.
      required: false
      selector:
        text:
    volume:
      name: Volume
      description: Announcement volume from 0 to 100.
      required: false
      selector:
        number:
          min: 0
          max: 100
          mode: slider
    alexa_notification_type:
      name: Alexa notification type
      description: Use announce for the Alexa announcement chime, or tts for speech without the announcement chime.
      required: false
      selector:
        select:
          options:
            - label: Announce with chime
              value: announce
            - label: TTS without announcement chime
              value: tts
    media_player_entity_ids:
      name: TTS media players
      description: Optional explicit media player entity IDs for Home Assistant TTS.
      required: false
      selector:
        entity:
          domain: media_player
          multiple: true
    alexa_media_player_entity_ids:
      name: Alexa media players
      description: Optional explicit Alexa Media Player entity IDs for notify.alexa_media announcements.
      required: false
      selector:
        entity:
          domain: media_player
          multiple: true
