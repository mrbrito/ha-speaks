announce:
  name: Announce
  description: Broadcast a spoken announcement to a HA Speaks group or explicit media players.
  fields:
    message:
      name: Message
      description: Text to announce.
      required: true
      selector:
        text:
    group:
      name: Group
      description: HA Speaks speech group name.
      required: false
      selector:
        text:
    volume:
      name: Volume
      description: Announcement volume from 0 to 10.
      required: false
      selector:
        number:
          min: 0
          max: 10
          mode: slider
    media_player_entity_ids:
      name: Media players
      description: Optional explicit media player entity IDs.
      required: false
      selector:
        entity:
          domain: media_player
          multiple: true

